name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.91.1"
  CROSS_VERSION: "0.2.5"

jobs:
  cache-gate:
    name: Check main cross caches
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify main cache entries
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          LOCK_HASH: ${{ hashFiles('Cargo.lock') }}
        run: |
          set -euo pipefail
          cache_keys="$(gh api "/repos/${REPOSITORY}/actions/caches?ref=refs/heads/main&per_page=100" --jq '.actions_caches[].key')"
          expected=(
            "Linux-cross-common-${RUST_TOOLCHAIN}-${CROSS_VERSION}-${LOCK_HASH}"
          )
          targets=(
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            armv7-unknown-linux-gnueabihf
            x86_64-unknown-linux-musl
            aarch64-unknown-linux-musl
            riscv64gc-unknown-linux-gnu
            powerpc64le-unknown-linux-gnu
            s390x-unknown-linux-gnu
          )
          for target in "${targets[@]}"; do
            expected+=("Linux-cross-target-${target}-${RUST_TOOLCHAIN}-${CROSS_VERSION}-${LOCK_HASH}")
          done
          missing=0
          for key in "${expected[@]}"; do
            if grep -Fxq "$key" <<<"$cache_keys"; then
              echo "cache found: $key"
            else
              echo "cache missing: $key" >&2
              missing=1
            fi
          done
          test "$missing" -eq 0

  frontend:
    name: Frontend checks and assets
    needs: [cache-gate]
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Type-check frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Upload frontend assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-dist
          path: web/dist
          if-no-files-found: error

  verify:
    name: Rust verification
    needs: [cache-gate]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Rust verification state
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.RUST_TOOLCHAIN }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run all Rust tests
        run: cargo test --all-targets --locked

  build:
    name: Build ${{ matrix.target }} release
    needs: [frontend, verify]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - riscv64gc-unknown-linux-gnu
          - powerpc64le-unknown-linux-gnu
          - s390x-unknown-linux-gnu
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal

      - name: Restore common cross compiler and dependency cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/bin/cross
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cross-common-${{ env.RUST_TOOLCHAIN }}-${{ env.CROSS_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cross-common-${{ env.RUST_TOOLCHAIN }}-${{ env.CROSS_VERSION }}-

      - name: Restore target build cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: target/${{ matrix.target }}
          key: ${{ runner.os }}-cross-target-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}-${{ env.CROSS_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cross-target-${{ matrix.target }}-${{ env.RUST_TOOLCHAIN }}-${{ env.CROSS_VERSION }}-

      - name: Install pinned cross compiler
        run: |
          if [ ! -x "$HOME/.cargo/bin/cross" ]; then
            cargo +"$RUST_TOOLCHAIN" install cross --version "$CROSS_VERSION" --locked
          fi

      - name: Download frontend assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: frontend-dist
          path: web/dist

      - name: Build backend
        env:
          TARGET: ${{ matrix.target }}
        run: cross +"$RUST_TOOLCHAIN" build --release --locked --target "$TARGET"

      - name: Package project-local runtime
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          package="paper-codex-${RELEASE_TAG}-${RELEASE_TARGET}"
          install -d "${package}/web"
          install -m 0755 "target/${RELEASE_TARGET}/release/paper-codex" "${package}/paper-codex"
          cp -a web/dist/. "${package}/web/"
          cp deploy/paper-codex.user.service "${package}/"
          cp deploy/paper-codex.user.env.example "${package}/paper-codex.env.example"
          cat > "${package}/INSTALL.txt" <<EOF
          mkdir -p .runtime/releases/${RELEASE_TAG}
          tar -xzf ${package}.tar.gz -C .runtime/releases/${RELEASE_TAG} --strip-components=1
          ln -sfn releases/${RELEASE_TAG} .runtime/current
          if [ ! -e .runtime/paper-codex.env ]; then cp .runtime/current/paper-codex.env.example .runtime/paper-codex.env; fi
          cp .runtime/current/paper-codex.user.service ~/.config/systemd/user/paper-codex.service
          systemctl --user daemon-reload
          systemctl --user enable --now paper-codex
          EOF
          tar -czf "${package}.tar.gz" "${package}"
          sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ matrix.target }}
          path: |
            paper-codex-*.tar.gz
            paper-codex-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.tar.gz.sha256)
          test "${#assets[@]}" -eq 16
          gh release create "${RELEASE_TAG}" "${assets[@]}" \
            --repo "${GH_REPO}" \
            --verify-tag \
            --generate-notes
