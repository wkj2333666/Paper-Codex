name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontend:
    name: Frontend checks and assets
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Type-check frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist
          if-no-files-found: error

  verify:
    name: Rust verification
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run all Rust tests
        run: cargo test --all-targets --locked

  build:
    name: Build ${{ matrix.arch }} release
    needs: [frontend, verify]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            cross: false
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            cross: false
          - arch: armv7
            target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-24.04
            cross: true
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"
          rustup default stable

      - name: Install ARMv7 cross compiler
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross
          echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> "$GITHUB_ENV"

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist

      - name: Build backend
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package project-local runtime
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_ARCH: ${{ matrix.arch }}
          RELEASE_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          package="paper-codex-${RELEASE_TAG}-${RELEASE_ARCH}-${RELEASE_TARGET}"
          install -d "${package}/web"
          install -m 0755 "target/${RELEASE_TARGET}/release/paper-codex" "${package}/paper-codex"
          cp -a web/dist/. "${package}/web/"
          cp deploy/paper-codex.user.service "${package}/"
          cp deploy/paper-codex.user.env.example "${package}/paper-codex.env.example"
          cat > "${package}/INSTALL.txt" <<EOF
          mkdir -p .runtime/releases/${RELEASE_TAG}
          tar -xzf ${package}.tar.gz -C .runtime/releases/${RELEASE_TAG} --strip-components=1
          ln -sfn releases/${RELEASE_TAG} .runtime/current
          if [ ! -e .runtime/paper-codex.env ]; then cp .runtime/current/paper-codex.env.example .runtime/paper-codex.env; fi
          cp .runtime/current/paper-codex.user.service ~/.config/systemd/user/paper-codex.service
          systemctl --user daemon-reload
          systemctl --user enable --now paper-codex
          EOF
          tar -czf "${package}.tar.gz" "${package}"
          sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            paper-codex-*.tar.gz
            paper-codex-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.tar.gz.sha256)
          test "${#assets[@]}" -eq 6
          gh release create "${RELEASE_TAG}" "${assets[@]}" \
            --repo "${GH_REPO}" \
            --verify-tag \
            --generate-notes
